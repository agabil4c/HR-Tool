services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=sqlite:////app/data/hr_tool.db
      # For PostgreSQL deployment, comment the SQLite URL above and uncomment below:
      # - DATABASE_URL=postgresql://postgres:securepassword@db:5432/hr_tool
      
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://127.0.0.1
      - TRUSTED_PROXY_IPS=127.0.0.1,::1
      
      # SMTP Email Configuration
      - HR_TOOL_SMTP_HOST=smtp.gmail.com
      - HR_TOOL_SMTP_PORT=587
      - HR_TOOL_SMTP_USERNAME=admin@travelport.co.ug
      - HR_TOOL_SMTP_PASSWORD=ggqlgagdopvcqvvm
      - HR_TOOL_SMTP_SENDER=admin@travelport.co.ug
      - HR_TOOL_SMTP_USE_TLS=true
      - HR_TOOL_FRONTEND_URL=http://localhost
    volumes:
      - hr_tool_db_data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  hr_tool_db_data:
